services:
  nexus-engine:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always

  nexus-ui:
    build:
      context: ./web
    ports:
      - "5173:5173"
    depends_on:
      - nexus-engine
    restart: always

  nexus-ingestor:
    build:
      context: ./services/ingestor
    ports:
      - "8081:8081"
    restart: always
